<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Destination Dash — Card Hand</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;700&family=Cabin:wght@400;600&family=Architects+Daughter&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cardhand.css">
</head>
<body>

<div class="app-shell">

  <div class="status-bar">
    <h1>✈ Your Hand</h1>
    <div style="display:flex;gap:7px">
      <div class="stat-pill warn">⛽ 8</div>
      <div class="stat-pill">👤 4</div>
      <div class="stat-pill">✈ 3</div>
    </div>
  </div>

  <div class="hand-stage" id="hand-stage">
    <div class="nav-hint left"  id="nav-left">‹</div>
    <div class="nav-hint right" id="nav-right">›</div>
  </div>

  <div class="card-dots" id="card-dots"></div>

  <div class="action-bar">
    <button class="btn btn-play"    id="btn-play">✈ Play Card</button>
    <button class="btn btn-discard" id="btn-discard">✕ Discard</button>
  </div>

  <div class="demo-controls">
    <div class="demo-label">Demo Controls</div>
    <button class="btn btn-add" id="btn-add-fortune">+ Fortune</button>
    <button class="btn btn-add" id="btn-add-crisis">+ Crisis</button>
    <button class="btn btn-add" id="btn-add-fuel">+ Fuel</button>
    <button class="btn btn-add" id="btn-add-dest">+ Dest</button>
  </div>

</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <div class="modal-art"    id="modal-art"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-badge" id="modal-badge"></div>
    </div>
    <div class="modal-body"   id="modal-body"></div>
    <div class="modal-stats"  id="modal-stats"></div>
    <div class="modal-footer">
      <button class="btn btn-play"    id="modal-play-btn">✈ Play</button>
      <button class="btn btn-discard" id="modal-close-btn">✕ Close</button>
    </div>
  </div>
</div>
  <script type="module" src="cardhand.js"></script>

</body>
</html>
