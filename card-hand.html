<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Destination Dash — Card Hand</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;700&family=Cabin:wght@400;600&family=Architects+Daughter&display=swap" rel="stylesheet">
<style>

/* =====================================================
   RESET
   ===================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* =====================================================
   DESIGN TOKENS
   Edit colours and transition speed here.
   ===================================================== */
:root {
  --teal-dark:    #2E4A4F;
  --teal-mid:     #3D6B6E;
  --teal-light:   #5A9196;
  --gold:         #E8A820;
  --gold-light:   #F5C842;
  --coral:        #D94F3D;
  --coral-light:  #F07060;
  --sage:         #6B9B6A;
  --sage-light:   #8BBB8A;
  --sand:         #C8A97E;
  --sand-dark:    #9B7B55;
  --lavender:     #8B7FAF;
  --warm-white:   #F5EFE0;
  --card-face:    #FDFAF3;
  --ink:          #2A2118;
  --ink-soft:     #4A3D30;
  --font-display: 'Josefin Sans', sans-serif;
  --font-body:    'Cabin', sans-serif;
  --font-flavor:  'Architects Daughter', cursive;
}

/* =====================================================
   APP SHELL
   Full screen on phones; letterboxed 3:4 on wide screens.
   ===================================================== */
body {
  background: var(--teal-dark);
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(90,145,150,.2) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(107,155,106,.12) 0%, transparent 55%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-body);
  color: var(--warm-white);
}

.app-shell {
  width:  min(100vw, calc(20vh * 0.75));
  height: min(20vh, calc(100vw * 1.333));
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 14px 12px 10px;
}

/* =====================================================
   STATUS BAR
   ===================================================== */
.status-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.status-bar h1 {
  font-family: var(--font-display);
  font-size: clamp(.7rem, 3.5vw, 1rem);
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold-light);
}

.stat-pill {
  display: flex; align-items: center; gap: 4px;
  background: rgba(0,0,0,.3);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 20px;
  padding: 3px 9px;
  font-family: var(--font-display);
  font-size: clamp(.55rem, 2.4vw, .78rem);
  letter-spacing: .07em;
}
.stat-pill.warn   { border-color: rgba(232,168,32,.5);  color: var(--gold-light); }
.stat-pill.danger { border-color: rgba(217,79,61,.5);   color: var(--coral-light); }

/* =====================================================
   HAND STAGE
   IMPORTANT: no overflow:hidden here — cards must be
   visible even when they extend outside the stage bounds
   during animation.  The clipping happens at app-shell.
   ===================================================== */
.hand-stage {
  position: relative;
  width: 100%;
  flex: 1;
  min-height: 0;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

/* =====================================================
   CARDS
   Width, height, left, top, transform — ALL set by JS.
   CSS handles appearance only.
   ===================================================== */
.hand-card {
  position: absolute;
  left: 0; top: 0;           /* anchor; JS translates from here */
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  will-change: transform;
  -webkit-user-drag: none;
}

.card-face {
  position: absolute;
  inset: 0;
  background: var(--card-face);
  border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,.22);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Coloured top stripe per type */
.card-face::before {
  content: '';
  height: 4px;
  flex-shrink: 0;
}
[data-type="fortune"] .card-face::before { background: var(--gold); }
[data-type="crisis"]  .card-face::before { background: var(--coral); }
[data-type="dest"]    .card-face::before { background: var(--sage); }
[data-type="fuel"]    .card-face::before { background: var(--sand-dark); }
[data-type="model"]   .card-face::before { background: var(--lavender); }

.card-art {
  flex-shrink: 0;
  height: 48%;
  background: center/cover no-repeat;
  position: relative;
}
.card-art::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg,transparent 55%,rgba(0,0,0,.18) 100%);
}

.card-badge {
  position: absolute;
  top: 7px; right: 7px;
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .62rem;
  z-index: 2;
}
[data-type="fortune"] .card-badge { background: var(--gold);      color: var(--ink); }
[data-type="crisis"]  .card-badge { background: var(--coral);     color: #fff; }
[data-type="dest"]    .card-badge { background: var(--sage);      color: #fff; }
[data-type="fuel"]    .card-badge { background: var(--sand-dark); color: #fff; }
[data-type="model"]   .card-badge { background: var(--lavender);  color: #fff; }

.card-text {
  flex: 1;
  padding: 7px 9px 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
  min-height: 0;
}

.card-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(.5rem, 1.6vw, .76rem);
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}

.card-body {
  font-family: var(--font-flavor);
  font-size: clamp(.44rem, 1.4vw, .68rem);
  color: var(--ink-soft);
  line-height: 1.45;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
}

.card-stats { display: flex; gap: 5px; margin-top: auto; padding-top: 3px; }
.card-stat  {
  font-family: var(--font-display);
  font-size: clamp(.42rem, 1.3vw, .62rem);
  font-weight: 700;
  background: rgba(0,0,0,.07);
  border-radius: 10px;
  padding: 2px 6px;
  color: var(--ink-soft);
}

.card-back {
  position: absolute; inset: 0;
  border-radius: 12px;
  background: linear-gradient(135deg,#3a6368 0%,#2a4a50 50%,#3a6368 100%);
  border: 1.5px solid rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
}
.card-back::before {
  content: '';
  position: absolute; inset: 6px;
  border-radius: 8px;
  border: 1px dashed rgba(255,255,255,.2);
}
.card-back-label {
  font-family: var(--font-display);
  font-size: .55rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: rgba(255,255,255,.3);
}

/* nav arrows */
.nav-hint {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  width: 34px; height: 34px;
  background: rgba(0,0,0,.35);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  color: rgba(255,255,255,.5);
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s ease;
  z-index: 200;
}
.nav-hint.left  { left:  6px; }
.nav-hint.right { right: 6px; }
.nav-hint.show  { opacity: 1; }

/* =====================================================
   DOTS
   ===================================================== */
.card-dots {
  display: flex; gap: 5px;
  align-items: center; justify-content: center;
  height: 18px;
  flex-shrink: 0;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,.25);
  transition: all .25s ease;
}
.dot.active { width: 18px; background: var(--gold); }

/* =====================================================
   BUTTONS
   ===================================================== */
.action-bar {
  display: flex; gap: 10px;
  justify-content: center;
  width: 100%;
  flex-shrink: 0;
}

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 20px;
  font-family: var(--font-display);
  font-size: clamp(.58rem, 2.1vw, .76rem);
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  border: none; border-radius: 8px;
  cursor: pointer;
  transition: transform .12s ease;
  -webkit-tap-highlight-color: transparent;
  position: relative; overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 55%);
  pointer-events: none;
}
.btn:active { transform: scale(.96); }

.btn-play    { background: linear-gradient(145deg,var(--teal-light),var(--teal-mid)); color: var(--warm-white); border-bottom: 3px solid var(--teal-dark); box-shadow: 0 3px 10px rgba(46,74,79,.5); }
.btn-discard { background: linear-gradient(145deg,var(--coral-light),var(--coral));   color: #fff;              border-bottom: 3px solid #a03020;           box-shadow: 0 3px 10px rgba(160,48,32,.5); }
.btn-add     { background: linear-gradient(145deg,var(--gold-light),var(--gold));     color: var(--ink);        border-bottom: 3px solid #b07a10;           box-shadow: 0 3px 10px rgba(184,122,16,.4); }

/* =====================================================
   DEMO CONTROLS  (remove in production)
   ===================================================== */
.demo-controls {
  display: flex; flex-wrap: wrap; gap: 7px;
  justify-content: center;
  width: 100%;
  flex-shrink: 0;
}
.demo-label {
  font-family: var(--font-display);
  font-size: .58rem; letter-spacing: .12em;
  color: rgba(245,239,224,.4);
  text-transform: uppercase;
  width: 100%; text-align: center;
}

/* =====================================================
   MODAL
   ===================================================== */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(20,35,38,.88);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s ease;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--card-face);
  border-radius: 16px;
  box-shadow: 0 24px 64px rgba(0,0,0,.7);
  width: min(320px, 88vw);
  overflow: hidden;
  color: var(--ink);
  transform: scale(.88) translateY(20px);
  transition: transform .32s cubic-bezier(.34,1.2,.64,1);
  border: 1.5px solid rgba(255,255,255,.3);
}
.modal-backdrop.open .modal { transform: scale(1) translateY(0); }

.modal-art {
  height: 160px;
  background: var(--teal-mid) center/cover no-repeat;
  position: relative;
}
.modal-art::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg,transparent 40%,rgba(0,0,0,.3) 100%);
}

.modal-header  { padding: 14px 18px 4px; }
.modal-title   { font-family: var(--font-display); font-size: .95rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
.modal-badge   { display: inline-flex; align-items: center; gap: 4px; margin-top: 5px; padding: 2px 10px; border-radius: 20px; font-family: var(--font-display); font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; }

[data-type="fortune"] .modal-badge { background: rgba(232,168,32,.15); color: var(--gold);      border: 1px solid rgba(232,168,32,.3); }
[data-type="crisis"]  .modal-badge { background: rgba(217,79,61,.15);  color: var(--coral);     border: 1px solid rgba(217,79,61,.3); }
[data-type="dest"]    .modal-badge { background: rgba(107,155,106,.15);color: var(--sage);      border: 1px solid rgba(107,155,106,.3); }
[data-type="fuel"]    .modal-badge { background: rgba(200,169,126,.15);color: var(--sand-dark); border: 1px solid rgba(200,169,126,.3); }
[data-type="model"]   .modal-badge { background: rgba(139,127,175,.15);color: var(--lavender);  border: 1px solid rgba(139,127,175,.3); }

.modal-body   { padding: 10px 18px; font-family: var(--font-flavor); font-size: .82rem; color: var(--ink-soft); line-height: 1.6; }
.modal-stats  { display: flex; gap: 8px; padding: 4px 18px 12px; }
.modal-stat   { font-family: var(--font-display); font-size: .7rem; font-weight: 700; background: rgba(0,0,0,.07); border-radius: 12px; padding: 3px 10px; color: var(--ink-soft); }
.modal-footer { display: flex; gap: 8px; padding: 10px 18px 16px; border-top: 1px solid rgba(0,0,0,.08); }
.modal-footer .btn { flex: 1; justify-content: center; }

/* =====================================================
   ENTRANCE ANIMATION
   ===================================================== */
@keyframes card-enter {
  from { opacity: 0; transform: translateX(50px) scale(.82) !important; }
  to   { opacity: 1; }
}
.card-entering { animation: card-enter .38s cubic-bezier(.34,1.15,.64,1) forwards; }

</style>
</head>
<body>

<div class="app-shell">

  <div class="status-bar">
    <h1>✈ Your Hand</h1>
    <div style="display:flex;gap:7px">
      <div class="stat-pill warn">⛽ 8</div>
      <div class="stat-pill">👤 4</div>
      <div class="stat-pill">✈ 3</div>
    </div>
  </div>

  <div class="hand-stage" id="hand-stage">
    <div class="nav-hint left"  id="nav-left">‹</div>
    <div class="nav-hint right" id="nav-right">›</div>
  </div>

  <div class="card-dots" id="card-dots"></div>

  <div class="action-bar">
    <button class="btn btn-play"    id="btn-play">✈ Play Card</button>
    <button class="btn btn-discard" id="btn-discard">✕ Discard</button>
  </div>

  <div class="demo-controls">
    <div class="demo-label">Demo Controls</div>
    <button class="btn btn-add" id="btn-add-fortune">+ Fortune</button>
    <button class="btn btn-add" id="btn-add-crisis">+ Crisis</button>
    <button class="btn btn-add" id="btn-add-fuel">+ Fuel</button>
    <button class="btn btn-add" id="btn-add-dest">+ Dest</button>
  </div>

</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <div class="modal-art"    id="modal-art"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-badge" id="modal-badge"></div>
    </div>
    <div class="modal-body"   id="modal-body"></div>
    <div class="modal-stats"  id="modal-stats"></div>
    <div class="modal-footer">
      <button class="btn btn-play"    id="modal-play-btn">✈ Play</button>
      <button class="btn btn-discard" id="modal-close-btn">✕ Close</button>
    </div>
  </div>
</div>

<script>
/* =====================================================
   CardHand — Destination Dash
   =====================================================

   PUBLIC API
   ──────────
   const hand = new CardHand('#hand-stage', options);

   hand.addCard(data, {animate})   Add card to right end
   hand.removeCard(index?)         Remove by index (default = active)
   hand.removeActiveCard()         Remove active card
   hand.navigateTo(index)          Go to card by index
   hand.navigateNext()             Next card
   hand.navigatePrev()             Previous card
   hand.getActiveCard()            Returns active card data
   hand.openModal(index?)          Open detail modal
   hand.closeModal()               Close modal
   hand.onActiveCardTap(fn)        fn(cardData, el)
   hand.onCardPlay(fn)             fn(cardData)
   hand.onCardDiscard(fn)          fn(cardData)

   CARD DATA SHAPE
   ───────────────
   { id, type, title, body, art, faceDown, stats:[{icon,value}] }
   type: 'fortune' | 'crisis' | 'dest' | 'fuel' | 'model'

   FAN TUNING  (edit constants inside _measure())
   ───────────
   CARD_RATIO   card height / width          default 1.42
   CARD_W_FRAC  card width as % of stage     default 0.40
   PEEK_RATIO   horizontal shift per step    default 0.10
   DROOP_RATIO  downward drop per step       default 0.038
   BG_SCALE     scale per step from active   default 0.85
   MAX_ROT      max rotation in degrees      default 7
   ===================================================== */

class CardHand {

  constructor(selector, opts = {}) {
    this.stage = document.querySelector(selector);
    this.cards  = [];   // card data objects
    this._els   = [];   // parallel DOM elements

    this.activeIndex     = 0;
    this._swipeThreshold = opts.swipeThreshold ?? 40;
    this._holdDelay      = opts.holdDelay      ?? 480;
    this._cbTap          = opts.onActiveCardTap ?? null;
    this._cbPlay         = opts.onCardPlay      ?? null;
    this._cbDiscard      = opts.onCardDiscard   ?? null;

    this._drag        = null;
    this._holdTimer   = null;
    this._didMove     = false;
    this._resizeTimer = null;

    this._navLeft  = document.getElementById('nav-left');
    this._navRight = document.getElementById('nav-right');

    this._listen();
  }

  /* ── add / remove ──────────────────────────────── */

  addCard(data, opts = {}) {
    const animate = opts.animate !== false;
    this.cards.push(data);
    const el = this._build(data);
    this.stage.appendChild(el);
    this._els.push(el);

    // One rAF so the element has layout before we measure it
    requestAnimationFrame(() => {
      this._layout(animate);
      this._dots();
      this._hints();
      if (animate) {
        el.classList.add('card-entering');
        el.addEventListener('animationend',
          () => el.classList.remove('card-entering'), { once:true });
      }
    });
  }

  removeCard(idx = this.activeIndex) {
    if (!this.cards.length) return;
    idx = Math.max(0, Math.min(idx, this.cards.length - 1));
    const el = this._els[idx];
    el.style.transition = 'opacity .22s ease, transform .22s ease';
    el.style.opacity    = '0';
    el.style.transform += ' scale(.82)';
    setTimeout(() => {
      el.remove();
      this.cards.splice(idx, 1);
      this._els.splice(idx, 1);
      this.activeIndex = Math.min(this.activeIndex, Math.max(0, this.cards.length-1));
      this._layout(true); this._dots(); this._hints();
    }, 250);
  }

  removeActiveCard() { this.removeCard(this.activeIndex); }

  /* ── navigation ────────────────────────────────── */

  navigateTo(i) {
    if (i < 0 || i >= this.cards.length) return;
    this.activeIndex = i;
    this._layout(true); this._dots(); this._hints();
  }
  navigateNext() { this.navigateTo(this.activeIndex + 1); }
  navigatePrev() { this.navigateTo(this.activeIndex - 1); }
  getActiveCard() { return this.cards[this.activeIndex] ?? null; }

  /* ── callbacks ─────────────────────────────────── */

  onActiveCardTap(fn) { this._cbTap     = fn; }
  onCardPlay(fn)      { this._cbPlay    = fn; }
  onCardDiscard(fn)   { this._cbDiscard = fn; }

  /* ── modal ──────────────────────────────────────── */

  openModal(idx = this.activeIndex) {
    const card = this.cards[idx];
    if (!card) return;
    const backdrop = document.getElementById('modal-backdrop');
    const modal    = document.getElementById('modal');
    modal.dataset.type = card.type;

    const artEl = document.getElementById('modal-art');
    artEl.style.backgroundImage = card.art
      ? `url('${card.art}')`
      : `linear-gradient(135deg,${this._color(card.type)}55,${this._color(card.type)}22)`;

    document.getElementById('modal-title').textContent = card.title ?? '';
    document.getElementById('modal-body').textContent  = card.body  ?? '';
    document.getElementById('modal-badge').textContent = this._label(card.type);

    const stats = document.getElementById('modal-stats');
    stats.innerHTML = '';
    (card.stats ?? []).forEach(s => {
      const d = document.createElement('div');
      d.className = 'modal-stat';
      d.textContent = `${s.icon} ${s.value}`;
      stats.appendChild(d);
    });

    backdrop.classList.add('open');
    const close = e => {
      if (e.target === backdrop) {
        this.closeModal();
        backdrop.removeEventListener('pointerdown', close);
      }
    };
    backdrop.addEventListener('pointerdown', close);
  }

  closeModal() {
    document.getElementById('modal-backdrop')?.classList.remove('open');
  }

  /* ── LAYOUT ENGINE ──────────────────────────────── */

  /*
   * _measure()
   * All layout constants in one place.
   * Edit these to tune the fan appearance.
   *
   * CARD_RATIO   — height ÷ width (1.42 ≈ real playing card)
   * CARD_W_FRAC  — card width as a fraction of stage width
   * PEEK_RATIO   — horizontal offset per step as fraction of stage width
   *                Increase for a wider, more spread fan
   * DROOP_RATIO  — downward arc per step as fraction of stage height
   *                Increase for a deeper curve
   * BG_SCALE     — scale multiplier per step away from active (0–1)
   *                Lower = background cards shrink more dramatically
   * MAX_ROT      — max rotation in degrees on the outermost card
   *                Increase for a more angular, dramatic fan
   */
  _measure() {
    const CARD_RATIO  = 1.42;
    const CARD_W_FRAC = 0.40;
    const PEEK_RATIO  = 0.10;
    const DROOP_RATIO = 0.038;
    const BG_SCALE    = 0.85;
    const MAX_ROT     = 7;

    const sw = this.stage.offsetWidth;
    const sh = this.stage.offsetHeight;

    const cardW = Math.max(90, Math.min(210, sw * CARD_W_FRAC));
    const cardH = cardW * CARD_RATIO;
    const peek  = sw * PEEK_RATIO;
    const droop = sh * DROOP_RATIO;

    return { sw, sh, cardW, cardH, peek, droop, BG_SCALE, MAX_ROT };
  }

  /*
   * _layout(animate)
   * Positions every card using pixel transforms.
   * All transform values are computed here in JS —
   * no CSS variables are parsed, avoiding the clamp() issue.
   */
  _layout(animate = true) {
    if (!this._els.length) return;

    const { sw, sh, cardW, cardH, peek, droop, BG_SCALE, MAX_ROT } = this._measure();
    const ai    = this.activeIndex;
    const count = this._els.length;
    const cx    = sw / 2;
    const cy    = sh / 2;
    const span  = Math.max(1, Math.max(ai, count - 1 - ai));

    this._els.forEach((el, i) => {
      const dist    = i - ai;       // negative = left, 0 = active, positive = right
      const absDist = Math.abs(dist);

      // Set dimensions first so the card has a real size in the DOM
      el.style.width  = `${cardW}px`;
      el.style.height = `${cardH}px`;

      // X: centre the active card; offset others by peek per step
      const x = cx - cardW / 2 + dist * peek;
      // Y: active card at vertical centre; others drop by droop per step
      const y = cy - cardH / 2 + absDist * droop;

      // Scale: 1.0 for active, reduces by BG_SCALE per step
      const scale = Math.pow(BG_SCALE, absDist);

      // Rotation: spread evenly across MAX_ROT degrees
      const rotate = dist * (MAX_ROT / span);

      // Z-index: active always on top
      el.style.zIndex = 100 - absDist;

      // Opacity: gently fade distant cards
      el.style.opacity = Math.max(0.4, 1 - absDist * 0.07).toFixed(2);

      // Shadow
      el.style.boxShadow = absDist === 0
        ? '0 16px 44px rgba(0,0,0,.65), 0 4px 14px rgba(0,0,0,.45)'
        : '0 5px 18px rgba(0,0,0,.5), 0 2px 6px rgba(0,0,0,.3)';

      // Transition: on during navigation, off during drag
      el.style.transition = animate
        ? 'transform .42s cubic-bezier(.34,1.15,.64,1), opacity .35s ease, box-shadow .35s ease'
        : 'none';

      // The actual transform: translate from top-left, scale, rotate
      el.style.transform = `translate(${x}px,${y}px) scale(${scale}) rotate(${rotate}deg)`;

      el.classList.toggle('is-active', i === ai);
    });
  }

  /* ── BUILD CARD ELEMENT ─────────────────────────── */

  _build(data) {
    const el = document.createElement('div');
    el.className      = 'hand-card';
    el.dataset.type   = data.type  ?? 'fortune';
    el.dataset.cardId = data.id    ?? '';

    if (data.faceDown) {
      el.innerHTML = `<div class="card-back">
        <span class="card-back-label">Destination Dash</span></div>`;
    } else {
      const artBg    = data.art ? `url('${data.art}')` : '';
      const artColor = this._color(data.type);
      const stats    = (data.stats ?? []).map(s =>
        `<span class="card-stat">${s.icon} ${s.value}</span>`).join('');

      el.innerHTML = `
        <div class="card-face">
          <div class="card-art"
            style="background-image:${artBg};background-color:${artColor}33;"></div>
          <div class="card-badge">${this._icon(data.type)}</div>
          <div class="card-text">
            <div class="card-title">${data.title ?? ''}</div>
            <div class="card-body">${data.body ?? ''}</div>
            ${stats ? `<div class="card-stats">${stats}</div>` : ''}
          </div>
        </div>`;
    }
    return el;
  }

  /* ── INPUT HANDLING ─────────────────────────────── */

  _listen() {
    const s = this.stage;
    s.addEventListener('pointerdown',   e => this._down(e),   { passive:true });
    s.addEventListener('pointermove',   e => this._move(e),   { passive:true });
    s.addEventListener('pointerup',     e => this._up(e));
    s.addEventListener('pointercancel', ()  => this._cancel());

    document.addEventListener('keydown', e => {
      if (e.key==='ArrowRight') this.navigateNext();
      if (e.key==='ArrowLeft')  this.navigatePrev();
      if (e.key==='Enter'||e.key===' ') this.openModal();
      if (e.key==='Escape')     this.closeModal();
    });

    window.addEventListener('resize', () => {
      clearTimeout(this._resizeTimer);
      this._resizeTimer = setTimeout(() => this._layout(false), 80);
    });
  }

  _down(e) {
    this._didMove = false;
    this._drag    = { startX: e.clientX, startY: e.clientY, lastX: e.clientX };
    this._holdTimer = setTimeout(() => {
      if (!this._didMove) this.openModal();
    }, this._holdDelay);
  }

  _move(e) {
    if (!this._drag) return;
    const dx = e.clientX - this._drag.startX;
    const dy = e.clientY - this._drag.startY;
    if (Math.abs(dx) > 6 || Math.abs(dy) > 6) {
      this._didMove = true;
      clearTimeout(this._holdTimer);
    }
    this._drag.lastX = e.clientX;
  }

  _up(e) {
    if (!this._drag) return;
    clearTimeout(this._holdTimer);
    const dx      = e.clientX - this._drag.startX;
    const dy      = e.clientY - this._drag.startY;
    const didMove = this._didMove;
    this._drag    = null;
    this._didMove = false;

    if (didMove) {
      // Swipe: horizontal must dominate
      if (Math.abs(dx) > this._swipeThreshold && Math.abs(dx) > Math.abs(dy) * 1.2) {
        if (dx < 0) this.navigateNext();
        else        this.navigatePrev();
      }
    } else {
      // Short tap — identify which card was hit
      const hit    = document.elementFromPoint(e.clientX, e.clientY);
      const cardEl = hit?.closest?.('.hand-card');
      const idx    = cardEl ? this._els.indexOf(cardEl) : -1;

      if (idx === this.activeIndex && cardEl) {
        if (this._cbTap) this._cbTap(this.cards[idx], cardEl);
      } else if (idx !== -1) {
        this.navigateTo(idx);
      }
    }
  }

  _cancel() {
    clearTimeout(this._holdTimer);
    this._drag = null; this._didMove = false;
    this._layout(true);
  }

  /* ── UI HELPERS ─────────────────────────────────── */

  _dots() {
    const c = document.getElementById('card-dots');
    if (!c) return;
    c.innerHTML = '';
    this.cards.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = `dot${i === this.activeIndex ? ' active' : ''}`;
      c.appendChild(d);
    });
  }

  _hints() {
    this._navLeft ?.classList.toggle('show', this.activeIndex > 0);
    this._navRight?.classList.toggle('show', this.activeIndex < this.cards.length - 1);
  }

  /* ── TYPE HELPERS ───────────────────────────────── */

  _icon(t)  { return {fortune:'★',crisis:'⚠',dest:'◎',fuel:'⛽',model:'✈'}[t]??'?'; }
  _label(t) { return {fortune:'★ Fortune',crisis:'⚠ Crisis',dest:'◎ Destination',
                      fuel:'⛽ Fuel Canister',model:'✈ Model (DLC)'}[t]??t; }
  _color(t) { return {fortune:'#E8A820',crisis:'#D94F3D',dest:'#6B9B6A',
                      fuel:'#C8A97E',model:'#8B7FAF'}[t]??'#888'; }
}

/* =====================================================
   INIT
   ===================================================== */

const hand = new CardHand('#hand-stage', {
  swipeThreshold: 40,
  holdDelay:      480,
  onActiveCardTap() { hand.openModal(); },
  onCardPlay(c)     { console.log('Play:',c.title); hand.closeModal(); hand.removeActiveCard(); },
  onCardDiscard(c)  { console.log('Discard:',c.title); hand.closeModal(); hand.removeActiveCard(); },
});

/* Wire buttons */
document.getElementById('btn-play').onclick    = () => { const c=hand.getActiveCard(); if(c&&hand._cbPlay)    hand._cbPlay(c); };
document.getElementById('btn-discard').onclick = () => { const c=hand.getActiveCard(); if(c&&hand._cbDiscard) hand._cbDiscard(c); };
document.getElementById('modal-play-btn').onclick  = () => { const c=hand.getActiveCard(); if(c&&hand._cbPlay) hand._cbPlay(c); };
document.getElementById('modal-close-btn').onclick = () => hand.closeModal();

/* Demo buttons */
let n = 10;
document.getElementById('btn-add-fortune').onclick = () =>
  hand.addCard({id:`f${n++}`,type:'fortune',title:'Hack The System',
    body:'Instead of rolling the die, gain up to 6 passengers at end of turn.',stats:[]});
document.getElementById('btn-add-crisis').onclick = () =>
  hand.addCard({id:`c${n++}`,type:'crisis',title:'Fuel Leak',
    body:'Roll the die twice. Remove fuel equal to or more than the sum.',stats:[]});
document.getElementById('btn-add-fuel').onclick = () =>
  hand.addCard({id:`u${n++}`,type:'fuel',title:'Fuel Canister',body:'',
    stats:[{icon:'⛽',value:String(Math.floor(Math.random()*7)+2)}]});
document.getElementById('btn-add-dest').onclick = () =>
  hand.addCard({id:`d${n++}`,type:'dest',title:'Mount Ignis',
    body:'The heart of the planet roars with the might of a thousand dragons.',
    stats:[{icon:'⛽',value:'15'},{icon:'👤',value:'4–8'}]});

/* Starting hand — stagger slightly for a cascade-in effect */
requestAnimationFrame(() => {
  [
    {id:'c1',type:'fortune',title:'Crisis Averted',
     body:'Ignore the current crisis. Only playable during the resolution phase.',stats:[]},
    {id:'u1',type:'fuel',title:'Fuel Canister',body:'',stats:[{icon:'⛽',value:'6'}]},
    {id:'f1',type:'fortune',title:'Overdrive',
     body:'You have an unlimited number of actions this turn.',stats:[]},
    {id:'cr1',type:'crisis',title:'Sabotaged',
     body:'Discard all cards in your hand (including crises).',stats:[]},
    {id:'d1',type:'dest',title:'Lonely Hills',
     body:'You feel an irresistible urge to venture deeper into the labyrinth of valleys.',
     stats:[{icon:'⛽',value:'7'},{icon:'👤',value:'1–4'}]},
  ].forEach((c, i) => setTimeout(() => hand.addCard(c, {animate: i > 0}), i * 70));
});
</script>
